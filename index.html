<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#1a1033" />
<title>বাংলা পঞ্জিকা</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
  :root{
    --bg:#120a26; --bg2:#1d1240; --card:#1a1138; --line:#2a1d55;
    --text:#f3eaff; --muted:#a99cd8; --gold:#f5c66b; --rose:#ff9bb3;
    --accent:#7a5cff; --good:#8be9b8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:linear-gradient(180deg,#0d0620,#1a0f3a);color:var(--text);font-family:'Noto Sans Bengali',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  header{padding:18px 16px 8px;text-align:center}
  header h1{margin:0;font-size:20px;letter-spacing:.5px;color:var(--gold);font-weight:600}
  header .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .wrap{max-width:1100px;margin:0 auto;padding:8px 12px 32px}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0 12px}
  .nav button{background:var(--card);border:1px solid var(--line);color:var(--text);width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
  .nav .title{flex:1;text-align:center}
  .nav .title .bn{font-size:22px;color:var(--gold)}
  .nav .title .en{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .cal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:10px;overflow:hidden}
  .dow,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .dow div{text-align:center;font-size:12px;color:var(--rose);padding:6px 0}
  .cell{position:relative;aspect-ratio:1/1.05;border-radius:10px;background:transparent;padding:6px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;border:1px solid transparent}
  .cell.has{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04)}
  .cell.today{background:rgba(245,198,107,.08);border-color:rgba(245,198,107,.35)}
  .cell.sel{outline:2px solid var(--rose);background:rgba(255,155,179,.08)}
  .cell .d{font-size:16px;color:var(--rose);text-align:right;line-height:1}
  .cell.has .d{color:#fff}
  .cell .t{font-size:11px;color:var(--muted);text-align:center;line-height:1.1}
  .cell .dot{position:absolute;top:8px;left:8px;width:6px;height:6px;border-radius:50%;background:#fff;opacity:.5}
  .cell .t.purnima{color:var(--gold)}
  .cell .t.amavasya{color:var(--rose)}
  .cell .t.ekadashi{color:#8be9b8}

  .panel{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px}
  .panel h2{margin:0 0 2px;font-size:18px;color:var(--gold);font-weight:600}
  .panel .sub2{color:var(--muted);font-size:12px;margin-bottom:12px}
  .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .item{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .item .k{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .item .v{font-size:17px;color:#fff;margin-top:2px}
  .item .v small{display:block;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
  .badge{display:inline-block;background:linear-gradient(135deg,#f5c66b,#ff9bb3);color:#2a0f3a;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;margin-top:6px}
  .times{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:10px}
  .tm{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
  .tm .l{font-size:12px;color:var(--muted)}
  .tm .r{font-size:14px;color:#fff;font-variant-numeric:tabular-nums}
  .fest{margin-top:10px;font-size:13px;color:var(--gold)}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:14px 0 6px}
  @media(max-width:520px){
    .cell .t{font-size:10px}
    .cell .d{font-size:14px}
  }
</style>
</head>
<body>
<header>
  <h1>বাংলা গৌড়ীয় পঞ্জিকা</h1>
  <div class="sub">কাশিয়ানী • UTC+৬</div>
</header>

<div class="wrap">
  <div class="nav">
    <button id="prev" aria-label="পূর্ব">‹</button>
    <div class="title">
      <div class="bn" id="monthTitle">—</div>
      <div class="en" id="monthSub">—</div>
    </div>
    <button id="next" aria-label="পরবর্তী">›</button>
  </div>

  <div class="cal">
    <div class="dow">
      <div>রবি</div><div>সোম</div><div>মঙ্গল</div><div>বুধ</div><div>বৃহঃ</div><div>শুক্র</div><div>শনি</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="panel" id="detail"></div>

  <footer>ॐ • গৌড়ীয় বৈষ্ণব পঞ্জিকা</footer>
</div>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
